<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - PowerTrack SL</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">

        <h1 class="logo">⚡ PowerTrack SL</h1>
        <button id="themeBtn" class="theme-btn">
        🌙
        </button>

    <!-- Hamburger Button -->
    <div class="menu-toggle" id="menuToggle">
        ☰
    </div>

    <ul class="nav-links" id="navLinks">

        <li><a href="index.html">Home</a></li>

        <li><a href="about.html">About</a></li>

        <li><a href="outage-report.html">Report</a></li>

        <li><a href="updates.html">Updates</a></li>

        <li><a href="contact.html">Contact</a></li>

    </ul>

</nav>
    

    <!-- Hero Section -->
    <section class="hero">
        <h2>Contact PowerTrack SL</h2>
        <p>Reach out to us for support and electricity updates.</p>
    </section>

    <!-- Contact Section -->
    <section class="contact-container">

        <!-- Contact Info -->
        <div class="contact-info">

            <h3>Contact Information</h3>

            <p><strong>Email:</strong> support@powertracksl.com</p>

            <p><strong>Phone:</strong> +232 76 123456</p>

            <p><strong>Location:</strong> Freetown, Sierra Leone</p>

        </div>

        <!-- Contact Form -->
        <div class="contact-form">

            <form id="contactForm">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="contactName"
                    placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="contactEmail"
                    placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label>Message</label>

                    <textarea id="contactMessage"
                    rows="5"
                    placeholder="Type your message"></textarea>
                </div>

                <button type="submit" class="btn">
                    Send Message
                </button>

            </form>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
